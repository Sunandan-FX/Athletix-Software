{% if messages %}
    {% for msg in messages %}
    <div class="message {% if msg.sender == user %}sent{% else %}received{% endif %}">
        <div>
            <div class="message-bubble">{{ msg.content }}</div>
            <div class="message-time">{{ msg.created_at|date:"M d, H:i" }}</div>
        </div>
    </div>
    {% endfor %}
{% else %}
    <div class="empty-messages">No messages yet. Start the conversation!</div>
{% endif %}
